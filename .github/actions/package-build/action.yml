name: NTIS UI Package Build
description: Build, package, and upload the NTIS UI artifact.

inputs:
  version:
    description: Release version in x.y.z.w format.
    required: true
  branch:
    description: Branch being built.
    required: false
    default: main
  path-mode:
    description: Upload path mode. Use standalone for repo-local runs and orchestrated for ntis-devops runs.
    required: false
    default: standalone
  branch-env-map:
    description: JSON mapping of branch names to environment names.
    required: true
  package-container-name:
    description: Azure Blob container name for package uploads.
    required: true
  package-connection-string:
    description: Azure Storage connection string.
    required: true
  node-version:
    description: Node.js version to use.
    required: false
    default: 20.x

outputs:
  version:
    description: Validated version.
    value: ${{ steps.version_setup.outputs.version }}
  artifact-name:
    description: Generated artifact name.
    value: ${{ steps.version_setup.outputs.artifact-name }}
  environment:
    description: Target environment derived from branch.
    value: ${{ steps.version_setup.outputs.environment }}
  branch:
    description: Branch used for the build.
    value: ${{ steps.version_setup.outputs.branch }}

runs:
  using: composite
  steps:
    - name: Setup version and validation
      id: version_setup
      shell: pwsh
      run: |
        $version = '${{ inputs.version }}'
        $branch = '${{ inputs.branch }}'
        $branchEnvMap = '${{ inputs.branch-env-map }}' | ConvertFrom-Json
        $environment = if ($branchEnvMap.PSObject.Properties[$branch]) {
          $branchEnvMap.$branch
        } else {
          'production'
        }

        if ($version -notmatch '^\d+\.\d+\.\d+\.\d+$') {
          Write-Error "Invalid version format: $version. Expected: x.y.z.w"
          exit 1
        }

        $artifactName = "ntis-ui-$environment-v$version"

        "version=$version" >> $env:GITHUB_OUTPUT
        "artifact-name=$artifactName" >> $env:GITHUB_OUTPUT
        "environment=$environment" >> $env:GITHUB_OUTPUT
        "branch=$branch" >> $env:GITHUB_OUTPUT

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install dependencies
      shell: pwsh
      run: |
        npm install

    # ✅ FIX STARTS HERE
    - name: Set production environment
      shell: pwsh
      run: |
        echo "NODE_ENV=production" >> $env:GITHUB_ENV

    - name: Build Next.js (Production - NO TURBOPACK)
      shell: pwsh
      env:
        NEXT_PUBLIC_APP_VERSION: ${{ steps.version_setup.outputs.version }}
        NEXT_DISABLE_TURBOPACK: 1
      run: |
        Write-Output "Cleaning old build..."
        if (Test-Path ".next") {
          Remove-Item -Recurse -Force .next
        }

        Write-Output "Starting production build..."
        npx next build

        Write-Output "Build completed successfully"

    - name: Verify standalone build
      shell: pwsh
      run: |
        if (Test-Path ".next/standalone") {
          Write-Output "✓ Standalone build generated"
        } else {
          Write-Error "❌ Standalone build NOT generated"
          exit 1
        }
    # ✅ FIX ENDS HERE

    - name: Create deployment package
      shell: pwsh
      run: |
        $version = '${{ steps.version_setup.outputs.version }}'
        $deploymentDir = "ntis-ui-v$version"

        New-Item -ItemType Directory -Path $deploymentDir -Force | Out-Null

        Copy-Item -Path '.next/standalone/*' -Destination "$deploymentDir" -Recurse

        Copy-Item -Path '.next/static' -Destination "$deploymentDir/.next/static" -Recurse
        Copy-Item -Path 'public' -Destination "$deploymentDir/public" -Recurse

        if (Test-Path '.env') {
          Copy-Item -Path '.env' -Destination "$deploymentDir/.env"
        }

    - name: Create zip archive
      shell: pwsh
      run: |
        $version = '${{ steps.version_setup.outputs.version }}'
        $environment = '${{ steps.version_setup.outputs.environment }}'
        $deploymentDir = "ntis-ui-v$version"
        $zipFile = "ntis-ui-$environment-v$version.zip"

        Compress-Archive -Path "$deploymentDir/*" -DestinationPath $zipFile -Force

    - name: Upload to Azure Blob Storage
      shell: pwsh
      run: |
        $version = '${{ steps.version_setup.outputs.version }}'
        $environment = '${{ steps.version_setup.outputs.environment }}'
        $pathMode = '${{ inputs.path-mode }}'
        $containerName = '${{ inputs.package-container-name }}'
        $connectionString = '${{ inputs.package-connection-string }}'
        $basePath = if ($pathMode -eq 'orchestrated') { "$environment/$version/ui" } else { "ui/$version" }
        $zipFile = "ntis-ui-$environment-v$version.zip"
        $zipBlob = "$basePath/$zipFile".Replace('\\', '/')

        az storage blob upload `
          --connection-string "$connectionString" `
          --container-name "$containerName" `
          --file $zipFile `
          --name $zipBlob `
          --overwrite
