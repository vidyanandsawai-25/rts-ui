name: CI Build and Test

on:
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: [self-hosted, ci]

    defaults:
      run:
        shell: powershell -ExecutionPolicy Bypass -Command "& '{0}'"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Type checking
        run: npm run type-check

      - name: Run linter
        run: npm run lint

      - name: Build application
        run: npm run build:production

      - name: Analyze bundle size
        run: |
          Write-Host "Build output size:"
          $nextSize = (Get-ChildItem -Path .next -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host ("{0:N2} MB" -f $nextSize)
          Write-Host "Static files size:"
          $staticSize = (Get-ChildItem -Path .next/static -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host ("{0:N2} MB" -f $staticSize)
